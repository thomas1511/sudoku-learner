name: Deploy to Netlify

# Builds the SPA and deploys to Netlify on every push. Pushes to the default
# branch publish to production; other branches and PRs create preview deploys.
on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # v5 of these actions run on the Node.js 24 action runtime.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Deploy the prebuilt dist/ with the Netlify CLI, which runs on the
      # runner's Node (24) — avoiding any deprecated Node 20 action runtime.
      - name: Deploy to Netlify
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] && [ "${{ github.ref_name }}" = "$DEFAULT_BRANCH" ]; then
            echo "Deploying to production"
            npx --yes netlify-cli@17 deploy --dir=dist --prod --message "Deploy ${{ github.sha }}" --json > deploy.json
          else
            echo "Deploying preview"
            npx --yes netlify-cli@17 deploy --dir=dist --message "Preview ${{ github.sha }}" --json > deploy.json
          fi
          DEPLOY_URL=$(node -p "require('./deploy.json').deploy_url")
          SITE_URL=$(node -p "require('./deploy.json').url || ''")
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          {
            echo "### 🚀 Netlify deploy"
            echo ""
            echo "- Deploy URL: $DEPLOY_URL"
            if [ -n "$SITE_URL" ]; then echo "- Site URL: $SITE_URL"; fi
          } >> "$GITHUB_STEP_SUMMARY"
        timeout-minutes: 5

      # Post the preview link on the PR (uses the pre-installed gh CLI — no
      # third-party action, so nothing to deprecate).
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.number }}" \
            --repo "${{ github.repository }}" \
            --body "🔎 Netlify preview voor \`${{ github.event.pull_request.head.sha }}\`: ${{ steps.deploy.outputs.deploy_url }}"
